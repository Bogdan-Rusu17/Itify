apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgadmin
  namespace: itify
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pgadmin
  template:
    metadata:
      labels:
        app: pgadmin
    spec:
      containers:
        - name: pgadmin
          image: dpage/pgadmin4
          ports:
            - containerPort: 80
          env:
            - name: PGADMIN_DEFAULT_EMAIL
              valueFrom:
                secretKeyRef:
                  name: pgadmin-secret
                  key: email
            - name: PGADMIN_DEFAULT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pgadmin-secret
                  key: password
            - name: SCRIPT_NAME
              value: /pgadmin

---
apiVersion: v1
kind: Service
metadata:
  name: pgadmin
  namespace: itify
spec:
  selector:
    app: pgadmin
  ports:
    - port: 80
      targetPort: 80
